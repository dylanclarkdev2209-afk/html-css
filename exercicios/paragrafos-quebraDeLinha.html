<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parágrafos e Quebras de Linhas</title>
</head>
<body>
    <h1>Parágrafos e Quebras de Linhas</h1>
    <hr>
    <p>Você pode escrever 
        um parágrafo de 
        qualquer jeito.
        Basta colocar tudo 
        no meio do par 
        de tags &lt;p&gt; e &lt;/p&gt;</p>

    <p>Se precisar quebrar o texto em algum lugar específicio como esse, <br> você pode usar a tag &lt;br&gt;</p>

    <!--
        Quem manda no texto é a tag, não o enter!
        &lt; é o símbolo menor que
        &gt; é o símbolo maior que
        
        A tag para parágrafo é <p> Texto aqui </p>
        A tag para quebra de linha é <br>
    -->
</body>
</html>
